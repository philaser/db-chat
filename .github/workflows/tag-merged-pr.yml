name: Tag merged PR

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

concurrency:
  group: semantic-version-tags

jobs:
  tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Create next semantic version tag
        uses: actions/github-script@v7
        with:
          script: |
            const bumpLabels = new Set(['major', 'minor', 'patch']);
            const pr = context.payload.pull_request;
            const labels = pr.labels
              .map((label) => label.name)
              .filter((name) => bumpLabels.has(name));

            if (labels.length !== 1) {
              core.setFailed(
                `Merged PR #${pr.number} needs exactly one version label: major, minor, or patch. Found ${labels.length}: ${labels.join(', ') || 'none'}.`
              );
              return;
            }

            const semverPattern = /^v(\d+)\.(\d+)\.(\d+)$/;
            const tags = await github.paginate(github.rest.repos.listTags, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            const versions = tags
              .map((tag) => {
                const match = semverPattern.exec(tag.name);
                return match
                  ? { name: tag.name, parts: match.slice(1).map(Number) }
                  : null;
              })
              .filter(Boolean)
              .sort((left, right) => {
                for (let index = 0; index < 3; index += 1) {
                  if (left.parts[index] !== right.parts[index]) {
                    return right.parts[index] - left.parts[index];
                  }
                }
                return 0;
              });

            const fs = require('node:fs');
            const packageJson = JSON.parse(
              fs.readFileSync(`${process.env.GITHUB_WORKSPACE}/package.json`, 'utf8')
            );
            const packageVersion = packageJson.version;
            const packageMatch = /^(\d+)\.(\d+)\.(\d+)$/.exec(packageVersion);
            if (!packageMatch) {
              core.setFailed(`package.json version ${packageVersion} is not a semantic version baseline.`);
              return;
            }

            const current = versions[0]?.parts ?? packageMatch.slice(1).map(Number);
            const next = [...current];
            switch (labels[0]) {
              case 'major':
                next[0] += 1;
                next[1] = 0;
                next[2] = 0;
                break;
              case 'minor':
                next[1] += 1;
                next[2] = 0;
                break;
              case 'patch':
                next[2] += 1;
                break;
            }

            const tagName = `v${next.join('.')}`;
            core.notice(`Tagging merged PR #${pr.number} as ${tagName}.`);
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tagName}`,
              sha: pr.merge_commit_sha
            });
