name: Version label

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - labeled
      - unlabeled
      - reopened
      - synchronize

jobs:
  validate:
    name: Require one semantic version label
    runs-on: ubuntu-24.04
    steps:
      - name: Check version label
        uses: actions/github-script@v7
        with:
          script: |
            const bumpLabels = new Set(['major', 'minor', 'patch']);
            const labels = context.payload.pull_request.labels
              .map((label) => label.name)
              .filter((name) => bumpLabels.has(name));

            if (labels.length !== 1) {
              core.setFailed(
                `Pull requests into main need exactly one version label: major, minor, or patch. Found ${labels.length}: ${labels.join(', ') || 'none'}.`
              );
            }
